<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Login Test</title>
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f5f5;
      }
      .card {
        background: #fff;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 400px;
        width: 100%;
      }
      h2 {
        margin-top: 0;
      }
      #g_id_onload {
        margin: 1rem 0;
        display: flex;
        justify-content: center;
      }
      pre {
        background: #f0f0f0;
        padding: 0.75rem;
        border-radius: 6px;
        text-align: left;
        overflow-x: auto;
        font-size: 13px;
        max-height: 300px;
        overflow-y: auto;
      }
      .error {
        color: #d32f2f;
      }
      .hidden {
        display: none;
      }
      button {
        margin-top: 1rem;
        padding: 0.5rem 1.5rem;
        border: none;
        border-radius: 6px;
        background: #1a73e8;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover {
        background: #1557b0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Google Login Test</h2>
      <p>Sign in with Google to test the backend flow.</p>

      <div
        id="g_id_onload"
        data-client_id="267856791014-2qmh7fjned6vpv3mqh8hhptkbq7lr65p.apps.googleusercontent.com"
        data-callback="handleCredentialResponse"
        data-auto_prompt="false"
      ></div>
      <div class="g_id_signin" data-type="standard"></div>

      <div id="result" class="hidden">
        <h3>Response</h3>
        <pre id="responseOutput"></pre>
        <button onclick="signOut()">Sign Out</button>
      </div>

      <div id="error" class="hidden">
        <h3 class="error">Error</h3>
        <pre id="errorOutput"></pre>
      </div>
    </div>

    <script>
      const API_URL = "/api/v1/auth/google";

      async function handleCredentialResponse(response) {
        document.getElementById("error").classList.add("hidden");
        document.getElementById("result").classList.remove("hidden");
        document.getElementById("responseOutput").textContent = "Verifying with server...";

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ idToken: response.credential }),
          });

          const data = await res.json();
          document.getElementById("responseOutput").textContent = JSON.stringify(data, null, 2);

          if (data.success && data.data?.token) {
            localStorage.setItem("token", data.data.token);
          }
        } catch (err) {
          document.getElementById("error").classList.remove("hidden");
          document.getElementById("errorOutput").textContent = err.message;
        }
      }

      function signOut() {
        localStorage.removeItem("token");
        document.getElementById("result").classList.add("hidden");
        document.getElementById("responseOutput").textContent = "";
        google.accounts.id.disableAutoSelect();
      }
    </script>
  </body>
</html>
